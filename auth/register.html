<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLife Portfolio - Register</title>
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <!-- Architecture CSS -->
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/pages/auth.css">
</head>
<body class="auth-bg">

    <div class="glass-card">
        <div class="mb-4">
            <i class="bi bi-person-plus fs-1"></i>
            <h3 class="fw-bold mt-2">Create Account</h3>
            <p class="text-white-50">Join MyLife Portfolio today</p>
        </div>

        <form id="registerForm">
            <div class="mb-3 text-start">
                <label class="form-label ms-3 small fw-bold">Username</label>
                <input type="text" class="form-control glass-input" id="regUsername" placeholder="Choose a username" required>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label ms-3 small fw-bold">Email Address</label>
                <input type="email" class="form-control glass-input" id="regEmail" placeholder="Enter your email" required>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label ms-3 small fw-bold">Password</label>
                <input type="password" class="form-control glass-input" id="regPassword" placeholder="Create a password" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label ms-3 small fw-bold">Confirm Password</label>
                <input type="password" class="form-control glass-input" id="regConfirm" placeholder="Confirm your password" required>
            </div>
            
            <button type="submit" class="btn glass-btn w-100 mb-3" id="registerBtn">
                Register
            </button>
            
            <div id="registerMsg" class="text-success small d-none mb-3 bg-white rounded p-1"></div>
            <div id="registerError" class="text-danger small d-none mb-3 bg-white rounded p-1"></div>
        </form>

        <p class="small mb-0">
            Already have an account? <a href="login.html" class="text-white fw-bold text-decoration-none">Login</a>
        </p>
    </div>

    <!-- Logic Controller -->
    <script type="module" src="../js/core/auth.js"></script>
</body>
</html>
