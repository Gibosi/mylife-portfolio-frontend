<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyLife Portfolio - Forgot Password</title>
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <!-- Architecture CSS -->
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/pages/auth.css">
</head>
<body class="auth-bg">

    <div class="glass-card">
        <div class="mb-4">
            <i class="bi bi-shield-lock fs-1"></i>
            <h3 class="fw-bold mt-2">Reset Password</h3>
            <p class="text-white-50" id="stepDescription">Enter your email or phone number to receive a verification code</p>
        </div>

        <!-- STEP 1: Request Code -->
        <form id="step1Form">
            <div class="mb-4 text-start">
                <label class="form-label ms-3 small fw-bold">Email or Phone Number</label>
                <input type="text" class="form-control glass-input" id="resetContact" placeholder="e.g. wilson@example.com or +255..." required>
            </div>
            
            <button type="submit" class="btn glass-btn w-100 mb-3" id="sendCodeBtn">
                Send Verification Code
            </button>
            <div id="step1Error" class="text-danger small d-none mb-3 bg-white rounded p-1 fw-bold"></div>
        </form>

        <!-- STEP 2: Verify Code and Reset -->
        <form id="step2Form" class="d-none">
            <div class="mb-3 text-start">
                <label class="form-label ms-3 small fw-bold">6-Digit Verification Code</label>
                <input type="text" class="form-control glass-input text-center fs-4 letter-spacing-2" id="verifyCode" placeholder="000000" maxlength="6" required>
                <small class="text-white-50 ms-3">Sent to your email/phone</small>
            </div>
            <div class="mb-3 text-start">
                <label class="form-label ms-3 small fw-bold">New Password</label>
                <input type="password" class="form-control glass-input" id="newPassword" placeholder="Minimum 8 characters" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label ms-3 small fw-bold">Confirm New Password</label>
                <input type="password" class="form-control glass-input" id="confirmNewPassword" placeholder="Confirm your new password" required>
            </div>
            
            <button type="submit" class="btn btn-success glass-btn w-100 mb-3" id="resetPasswordBtn" style="background: var(--success) !important;">
                Verify & Reset Password
            </button>
            
            <div id="step2Error" class="text-danger small d-none mb-3 bg-white rounded p-1 fw-bold"></div>
            <div id="step2Success" class="text-success small d-none mb-3 bg-white rounded p-1 fw-bold"></div>
        </form>

        <p class="small mb-0 mt-3">
            Remember your password? <a href="login.html" class="text-white fw-bold text-decoration-none">Back to Login</a>
        </p>
    </div>

    <!-- Logic Controller -->
    <script type="module" src="../js/core/auth.js"></script>
</body>
</html>
